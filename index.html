<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHUB | DevOps Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-400">Portfolio<span class="text-white">HUB</span></h1>
        <div id="gemini-status" class="text-sm text-green-400 font-mono">IA Gemini Online</div>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <section id="hero" class="mb-12">
            <h2 class="text-4xl font-extrabold mb-4">Meus Projetos Técnicos</h2>
            <p class="text-gray-400">Explorando repositórios via GitHub API com análise de IA.</p>
        </section>

        <!-- Grid de Repositórios -->
        <div id="repo-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cards via JS -->
        </div>
            <!-- Os cards entrarão aqui via JS -->
            <p class="animate-pulse">Carregando repositórios...</p>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
